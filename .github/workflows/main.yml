name: Build Jarvis Controller

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clear system NDK and Install Dependencies
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            cmake ninja-build git ccache
          pip install --upgrade pip virtualenv setuptools Cython==3.0.11 sh wheel standard-imghdr pathspec
      - name: Install Android NDK r25b
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip
          # Записываем в GITHUB_ENV абсолютный путь на runner-е
          echo "ANDROID_NDK_HOME=$GITHUB_WORKSPACE/android-ndk-r25b" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/android-ndk-r25b" >> $GITHUB_ENV

      - name: Clone and Patch python-for-android
        run: |
          git clone -b develop https://github.com/kivy/python-for-android.git
          TARGET_FILE="python-for-android/pythonforandroid/recipes/libthorvg/__init__.py"
          
          # Заменяем сломанный поиск путей Clang на прямой путь, актуальный для NDK r25b
          sed -i 's/clang_dirs = glob.glob.*/clang_dirs = [os.path.join(self.ctx.ndk_dir, "toolchains", "llvm", "prebuilt", "linux-x86_64", "lib64", "clang")]/g' "$TARGET_FILE"
          sed -i 's/clang_dir = glob.glob.*/clang_dir = glob.glob(os.path.join(clang_dirs[0], "*"))[0]/g' "$TARGET_FILE"
          
          echo "Поле после патча:"
          sed -n '90,105p' "$TARGET_FILE"

      - name: Install Buildozer
        run: |
          pip install git+https://github.com/kivy/buildozer.git

      - name: Build APK with Buildozer
        run: |
          # Передаем P4A_dir, чтобы buildozer использовал именно наш пропатченный p4a
          export P4A_dir=$GITHUB_WORKSPACE/python-for-android
          buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-controller-apk
          path: bin/*.apk
